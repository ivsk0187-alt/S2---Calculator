<!DOCTYPE html>
<html>

<head>
    <title> Calculator</title>
    <link rel="icon" type="image/x-icon" href="https://stardewvalleywiki.com/mediawiki/images/b/b1/Dandelion.png"
        size="48x48">

    <style>
        .body {
            margin: 0;
        }

        .container {
            background-color: rgba(253, 208, 246);
            position: relative;
            justify-content: center;
            align-items: center;
            margin: 0;
            height: 100vh;


        }

        .item {
            position: absolute;
            top: 1%;
            left: 35%;
            height: auto;
            width: 600px;
        }

        .logo {
            position: absolute;
            top: 23%;
            left: 19%;
            height: auto;
            width: 400px;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;

        }

        .buttons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .btn {
            position: absolute;
            width: 110px;
            height: 67px;
            border: none;
            cursor: pointer;
        }

        .btn[data-value="1"] {
            background-color: transparent;
            bottom: 32%;
            left: 11%;
        }

        .btn[data-value="2"] {
            background-color: transparent;
            bottom: 32%;
            left: 31%;
        }

        .btn[data-value="3"] {
            background-color: transparent;
            bottom: 32%;
            left: 50.5%;
        }

        .btn[data-value="-"] {
            background-color: transparent;
            bottom: 32%;
            left: 70.5%;
        }

        .btn[data-value="0"] {
            background-color: transparent;
            bottom: 23%;
            left: 11%;
            width: 229px;
            height: 70px;
        }

        .btn[data-value="."] {
            background-color: transparent;
            bottom: 23%;
            left: 50.5%;
            height: 70px;

        }

        .btn[data-value="="] {
            background-color: transparent;
            bottom: 23%;
            left: 70.5%;
            height: 70px;
        }

        .btn[data-value="4"] {
            background-color: transparent;
            bottom: 40.5%;
            left: 11%;
        }

        .btn[data-value="5"] {
            background-color: transparent;
            bottom: 40.5%;
            left: 31%;
        }

        .btn[data-value="6"] {
            background-color: transparent;
            bottom: 40.5%;
            left: 50.5%;
        }

        .btn[data-value="+"] {
            background-color: transparent;
            bottom: 40.5%;
            left: 70.5%;
        }

        .btn[data-value="7"] {
            background-color: transparent;
            top: 43.5%;
            left: 11%;
        }

        .btn[data-value="8"] {
            background-color: transparent;
            top: 43.5%;
            left: 31%;
        }

        .btn[data-value="9"] {
            background-color: transparent;
            top: 43.5%;
            left: 50.5%;
        }

        .btn[data-value="x"] {
            background-color: transparent;
            top: 43.5%;
            left: 70.5%;
        }

        .btn[data-value="Backspace"] {
            background-color: transparent;
            top: 35%;
            left: 11%;
        }

        .btn[data-value="C"] {
            background-color: transparent;
            top: 35%;
            left: 31%;
        }

        .btn[data-value="/"] {
            background-color: transparent;
            top: 35%;
            left: 50.5%;
        }

        .btn[data-value="%"] {
            background-color: transparent;
            top: 35%;
            left: 70.5%;
        }

        #display {
            position: absolute;
            background-color: transparent;
            top: 20%;
            left: 11%;
            width: 450px;
            height: 100px;
            font-family: monospace;
            text-align: right;
            padding: 10px;
            font-size: 80px;
            overflow-x: hidden;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">
            <img src="https://i.imgur.com/3TZfMLc.png" alt="calculator">

            <div class="logo">
                <img src="https://i.imgur.com/PFzc32p.png" alt="logo-screen">
            </div>

            <div id="display"></div>

            <div class="buttons">
                <button class="btn" data-value="0"></button>
                <button class="btn" data-value="1"></button>
                <button class="btn" data-value="2"></button>
                <button class="btn" data-value="3"></button>
                <button class="btn" data-value="4"></button>
                <button class="btn" data-value="5"></button>
                <button class="btn" data-value="6"></button>
                <button class="btn" data-value="7"></button>
                <button class="btn" data-value="8"></button>
                <button class="btn" data-value="9"></button>
                <button class="btn" data-value="."></button>
                <button class="btn" data-value="="></button>
                <button class="btn" data-value="+"></button>
                <button class="btn" data-value="-"></button>
                <button class="btn" data-value="x"></button>
                <button class="btn" data-value="%"></button>
                <button class="btn" data-value="/"></button>
                <button class="btn" data-value="Backspace"></button>
                <button class="btn" data-value="C"></button>

            </div>

        </div>
    </div>

    <script src="calculator.js"></script>
</body>

</html>
